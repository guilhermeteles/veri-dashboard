<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V3R1 · Visão Geral</title>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --pri:#252d7a;--pri-50:#eceeff;--pri-100:#d8daff;--pri-400:#5c66d4;--pri-600:#3d4592;--pri-800:#252d7a;
  --em:#168821;--em-50:#e6f4e8;--em-400:#1a9e27;
  --am:#C48C14;--am-50:#fdf3dc;--am-400:#C48C14;--am-800:#7a5600;
  --co:#E52207;--co-50:#fdecea;--co-400:#E52207;--co-800:#8c1200;
  --bg:#f8f9ff;--surface:#ffffff;
  --sur-low:#f1f3fb;--sur-mid:#eceef6;--sur-high:#e6e8f0;
  --text-h:#181c21;--text-b:#464651;--text-m:#595c7c;--text-s:#767682;--border:#d8dae8;
  --font-d:'Plus Jakarta Sans',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'JetBrains Mono',monospace;
  --sh-card:0 1px 3px rgba(37,45,122,.08),0 4px 16px rgba(37,45,122,.04);
}
html,body{height:100%;overflow-y:auto;font-family:var(--font-b);background:var(--bg);color:var(--text-h)}
body::-webkit-scrollbar{width:6px}
body::-webkit-scrollbar-track{background:transparent}
body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.content{padding:20px 24px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi-card{background:var(--surface);border-radius:14px;padding:14px 16px;box-shadow:var(--sh-card);border:1px solid var(--border);border-top:3px solid var(--border);position:relative;overflow:hidden}
.kpi-card.blue{border-top-color:var(--pri-400)}.kpi-card.green{border-top-color:var(--em-400)}
.kpi-card.amber{border-top-color:var(--am-400)}.kpi-card.red{border-top-color:var(--co-400)}
.kpi-card.purple{border-top-color:#7c3aed}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-s);margin-bottom:6px}
.kpi-value{font-family:var(--font-d);font-size:26px;font-weight:800;color:var(--text-h);line-height:1}
.kpi-change{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;margin-top:6px;padding:2px 7px;border-radius:9999px}
.kpi-change.up{background:var(--em-50);color:var(--em)}.kpi-change.up-bad{background:var(--co-50);color:var(--co-400)}
.kpi-change.down-good{background:var(--em-50);color:var(--em)}.kpi-change.down{background:var(--co-50);color:var(--co-400)}

/* Layout */
.grid-60-40{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
.flex-col{display:flex;flex-direction:column}

/* Panel */
.panel{background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:var(--sh-card);overflow:hidden;display:flex;flex-direction:column}
.panel-header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:var(--font-d);font-size:12px;font-weight:800;color:var(--text-h)}
.panel-subtitle{font-size:10px;color:var(--text-s);margin-top:2px}
.panel-body{padding:12px 16px 16px}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-b);font-size:10px;font-weight:700;padding:2px 8px;border-radius:9999px}
.badge-ok{background:var(--em-50);color:var(--em);border:1px solid rgba(22,136,33,.15)}
.badge-warn{background:var(--am-50);color:var(--am-800);border:1px solid rgba(196,140,20,.2)}
.badge-err{background:var(--co-50);color:var(--co-800);border:1px solid rgba(229,34,7,.15)}
.badge-info{background:var(--pri-50);color:var(--pri-600);border:1px solid var(--pri-100)}

/* Alert */
.alert-item{display:flex;gap:10px;align-items:flex-start;padding:10px 16px;border-bottom:1px solid var(--sur-low)}
.alert-item:last-child{border-bottom:none}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alert-dot.red{background:var(--co-400);box-shadow:0 0 6px rgba(229,34,7,.4)}
.alert-dot.amber{background:var(--am-400);box-shadow:0 0 6px rgba(196,140,20,.4)}
.alert-text{font-size:12px;color:var(--text-b);line-height:1.4}
.alert-meta{font-size:10px;color:var(--text-s);margin-top:2px}

/* Chart bars */
.chart-bars{display:flex;align-items:flex-end;gap:6px;padding:8px 8px 4px;height:100%}
.chart-bar{flex:1;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--pri-400),var(--pri-600));opacity:.5;transition:opacity .15s;min-width:0}
.chart-bar:hover{opacity:.8}.chart-bar.hi{opacity:.85}

/* Table */
.data-table{width:100%;border-collapse:collapse}
.data-table thead th{font-size:10px;font-weight:700;color:var(--text-s);text-align:left;text-transform:uppercase;letter-spacing:.7px;padding:10px 12px;background:var(--sur-low);border-bottom:1px solid var(--border)}
.data-table tbody td{font-size:12px;color:var(--text-b);padding:10px 12px;border-bottom:1px solid var(--sur-low)}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--sur-low)}

.mono{font-family:var(--font-m);font-size:11px;color:var(--text-m)}
.mono-sm{font-family:var(--font-m);font-size:9px;color:var(--text-s)}
.btn-secondary{background:var(--sur-mid);border:1px solid var(--border);border-radius:9999px;padding:7px 16px;font-size:12px;font-weight:600;color:var(--text-b);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .15s}
.btn-secondary:hover{background:var(--sur-high)}
</style>
</head>
<body>
<div class="content">

  <!-- KPIs -->
  <div id="kpi-grid" class="kpi-grid"></div>

  <!-- Mapa + Alertas + Tendência -->
  <div class="grid-60-40" style="margin-bottom:16px">

    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="panel-title">Mapa de verificações</div>
          <div class="panel-subtitle">Concentração geográfica · ES</div>
        </div>
        <div class="badge badge-info">Heatmap</div>
      </div>
      <div class="panel-body" style="width:100%;flex:1;padding:10px 16px 16px">
        <div id="map-wrap" style="position:relative;width:100%;height:100%;border-radius:10px;overflow:hidden">
          <iframe id="map-iframe" width="100%" height="100%"
            style="position:absolute;inset:0;border:0;filter:grayscale(100%) contrast(100%) brightness(110%)"
            loading="lazy"></iframe>
          <canvas id="heatmap-canvas"
            style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;border-radius:10px;;"></canvas>
          <div style="position:absolute;bottom:10px;right:10px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.85);backdrop-filter:blur(4px);padding:4px 10px;border-radius:9999px;pointer-events:none">
            <span style="font-family:var(--font-m);font-size:8px;color:#595c7c">Baixo</span>
            <div style="width:60px;height:6px;border-radius:3px;background:linear-gradient(90deg,rgba(26,158,39,.6),rgba(196,140,20,.7),rgba(229,34,7,.85))"></div>
            <span style="font-family:var(--font-m);font-size:8px;color:#595c7c">Alto</span>
          </div>
        </div>
      </div>
    </div>

    <div class="flex-col" style="gap:12px">
      <div class="panel" style="flex:1">
        <div class="panel-header">
          <div>
            <div class="panel-title">Alertas recentes</div>
            <div class="panel-subtitle">Últimas 24h</div>
          </div>
          <span class="badge badge-err" id="alerts-badge"></span>
        </div>
        <div id="alerts-list" style="margin-top:8px"></div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title" id="trend-title"></div>
        </div>
        <div class="panel-body" style="padding-top:10px">
          <div class="chart-bars" id="trend-bars" style="height:80px"></div>
          <div id="trend-labels" style="display:flex;justify-content:space-between;margin-top:4px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="panel" style="margin-bottom:16px">
    <div class="panel-header">
      <div>
        <div class="panel-title">Verificações recentes</div>
        <div class="panel-subtitle" id="table-subtitle"></div>
      </div>
      <button class="btn-secondary" style="font-size:11px;padding:5px 12px" onclick="goTo('busca')">Ver todas →</button>
    </div>
    <div class="panel-body" style="padding:0">
      <table class="data-table">
        <thead>
          <tr><th>VIN</th><th>Veículo</th><th>Data/Hora</th><th>Agente</th><th>Unidade</th><th>Score</th><th>Resultado</th></tr>
        </thead>
        <tbody id="verif-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Rodapé -->
  <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--sur-high)">
    <span class="mono-sm" id="footer-version"></span>
    <span class="mono-sm" id="footer-sync"></span>
  </div>

</div>

<script src="data.js"></script>
<script>
function goTo(rota) {
  try {
    if (window.parent && window.parent.goTo) window.parent.goTo(rota);
    else window.postMessage({ goTo: rota }, '*');
  } catch(e) { window.postMessage({ goTo: rota }, '*'); }
}

function render() {
  renderKpis();
  renderMapa();
  renderAlertas();
  renderTendencia();
  renderTabela();
  renderRodape();
}

function renderKpis() {
  document.getElementById('kpi-grid').innerHTML = DB.kpis.map(k => `
    <div class="kpi-card ${k.color}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-change ${k.changeType}">${k.change}</div>
    </div>`).join('');
}

function renderMapa() {
  const { lat, lng, zoom } = DB.mapa;

  document.getElementById('map-iframe').src =
    `https://www.google.com/maps?q=${lat},${lng}&z=${zoom}&output=embed`;

  // 🔥 espera o layout estabilizar
  setTimeout(renderHeatmap, 100);
}

function renderHeatmap() {
  const canvas = document.getElementById('heatmap-canvas');
  const wrap   = document.getElementById('map-wrap');

  const rect = wrap.getBoundingClientRect();
  const W = Math.round(rect.width);
  const H = Math.round(rect.height);

  if (!W || !H) return;

  // 🔥 IMPORTANTE: usar devicePixelRatio pra evitar blur
  const dpr = window.devicePixelRatio || 1;

  canvas.width  = W * dpr;
  canvas.height = H * dpr;

  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // escala correta

  ctx.clearRect(0, 0, W, H);

  const R = W * 0.09;

  DB.mapa.pontos.forEach(p => {
    const cx = (p.x / 100) * W;
    const cy = (p.y / 100) * H;

    const r = Math.round(p.intensidade > 0.5 ? 229 : 26 + (196-26) * (p.intensidade/0.5));
    const g = Math.round(p.intensidade > 0.5 ? 158 - (158-34)*((p.intensidade-0.5)/0.5) : 158 + (196-158)*(p.intensidade/0.5));
    const b = p.intensidade > 0.5 ? 7 : 20;

    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${(0.18 + p.intensidade * 0.42).toFixed(2)})`;
    ctx.fill();
  });
}

function renderAlertas() {
  const dot = t => t === 'err' ? 'red' : 'amber';
  document.getElementById('alerts-badge').textContent = `${DB.alertas.length} novos`;
  document.getElementById('alerts-list').innerHTML = DB.alertas.map(a => `
    <div class="alert-item">
      <div class="alert-dot ${dot(a.tipo)}"></div>
      <div>
        <div class="alert-text">${a.texto}</div>
        <div class="alert-meta">${a.meta}</div>
      </div>
    </div>`).join('');
}

function renderTendencia() {
  const t = DB.tendencia;
  document.getElementById('trend-title').textContent = t.titulo;
  const max = Math.max(...t.valores);
  document.getElementById('trend-bars').innerHTML = t.valores.map((v,i) =>
    `<div class="chart-bar${t.destaques.includes(i)?' hi':''}" style="height:${Math.round(v/max*100)}%"></div>`
  ).join('');
  const last = t.labels.length - 1;
  document.getElementById('trend-labels').innerHTML = t.labels.map((l,i) =>
    `<span class="mono-sm"${i===last?' style="color:var(--pri-400)"':''}>${l}</span>`
  ).join('');
}

function renderTabela() {
  document.getElementById('table-subtitle').textContent = 'Últimas 10 ocorrências';
  document.getElementById('verif-tbody').innerHTML = DB.tabela_verif(10).map(r => `
    <tr style="cursor:pointer" onclick="goTo('detalhe')" title="Ver detalhe · ${r.veiculo}">
      <td><span class="mono">${r.vin}</span></td>
      <td>${r.veiculo}</td>
      <td><span class="mono-sm">${r.data}</span></td>
      <td>${r.agente}</td>
      <td>${r.unidade}</td>
      <td><span class="mono" style="color:${DB.score_color(r.score)}">${r.score}</span></td>
      <td><span class="badge ${DB.badge_class(r.status)}">${DB.badge_label(r.status)}</span></td>
    </tr>`).join('');
}

function renderRodape() {
  document.getElementById('footer-version').textContent = `${DB.sistema.orgao} · ${DB.sistema.versao}`;
  tick();
}

function tick() {
  const t = new Date().toTimeString().slice(0,8);
  const el = document.getElementById('footer-sync');
  if (el) el.innerHTML = `LAST_SYNC: <span style="color:var(--pri-400)">${t}</span> · STATUS: <span style="color:var(--em-400)">${DB.sistema.api_status}</span>`;
}

render();
setInterval(tick, 1000);
window.addEventListener('resize', renderHeatmap);
</script>
</body>
</html>
