<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V3R1 · Detalhe da Verificação</title>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --pri:#252d7a;--pri-50:#eceeff;--pri-100:#d8daff;--pri-400:#5c66d4;--pri-600:#3d4592;--pri-800:#252d7a;
  --em:#168821;--em-50:#e6f4e8;--em-400:#1a9e27;
  --am:#C48C14;--am-50:#fdf3dc;--am-400:#C48C14;--am-800:#7a5600;
  --co:#E52207;--co-50:#fdecea;--co-400:#E52207;--co-800:#8c1200;
  --bg:#f8f9ff;--surface:#ffffff;--sur-low:#f1f3fb;--sur-mid:#eceef6;--sur-high:#e6e8f0;
  --text-h:#181c21;--text-b:#464651;--text-m:#595c7c;--text-s:#767682;--border:#d8dae8;
  --font-d:'Plus Jakarta Sans',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'JetBrains Mono',monospace;
  --sh-card:0 1px 3px rgba(37,45,122,.08),0 4px 16px rgba(37,45,122,.04);
}
html,body{height:100%;overflow-y:auto;font-family:var(--font-b);background:var(--bg);color:var(--text-h)}
body::-webkit-scrollbar{width:6px}
body::-webkit-scrollbar-track{background:transparent}
body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.page{padding:20px 24px}

/* Hero */
.hero-panel{background:linear-gradient(135deg,var(--pri-800),var(--pri-600));border-radius:14px;padding:20px 22px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(37,45,122,.3)}
.hero-panel::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px);background-size:100% 3px}

/* Nav bar inside content */
.content-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.btn-back{display:inline-flex;align-items:center;gap:6px;background:var(--sur-mid);border:1px solid var(--border);border-radius:9999px;padding:6px 14px;font-size:11px;font-weight:600;color:var(--text-b);cursor:pointer}
.btn-back:hover{background:var(--sur-high)}

/* Layout */
.detail-grid{display:grid;grid-template-columns:1fr 320px;gap:16px}
.panel{background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:var(--sh-card);overflow:hidden;margin-bottom:16px}
.panel:last-child{margin-bottom:0}
.panel-header{padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:var(--font-d);font-size:13px;font-weight:800;color:var(--text-h)}
.panel-subtitle{font-size:10px;color:var(--text-s);margin-top:2px}
.panel-body{padding:14px 18px 18px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-b);font-size:10px;font-weight:700;padding:3px 10px;border-radius:9999px}
.badge-ok{background:var(--em-50);color:var(--em);border:1px solid rgba(22,136,33,.15)}
.badge-warn{background:var(--am-50);color:var(--am-800);border:1px solid rgba(196,140,20,.2)}
.badge-err{background:var(--co-50);color:var(--co-800);border:1px solid rgba(229,34,7,.15)}
.badge-info{background:var(--pri-50);color:var(--pri-600);border:1px solid var(--pri-100)}

/* Evidence */
.evidence-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.evidence-thumb{border-radius:10px;overflow:hidden;position:relative;cursor:zoom-in;background:var(--sur-high);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.ev-label{position:absolute;bottom:6px;left:6px;font-family:var(--font-m);font-size:8px;font-weight:700;color:#fff;background:rgba(0,0,0,.55);padding:2px 7px;border-radius:9999px}
.ev-score{position:absolute;top:6px;right:6px;font-family:var(--font-m);font-size:9px;font-weight:700;padding:2px 7px;border-radius:9999px}

/* Timeline */
.timeline-item{display:flex;gap:12px;padding-bottom:14px;position:relative}
.timeline-item::before{content:'';position:absolute;top:20px;left:9px;width:2px;height:calc(100% - 8px);background:var(--sur-high)}
.timeline-item:last-child::before{display:none}
.tl-dot{width:20px;height:20px;border-radius:50%;background:var(--sur-high);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;position:relative;z-index:1}
.tl-dot.ok{background:var(--em-50);border-color:var(--em-400)}
.tl-dot.warn{background:var(--am-50);border-color:var(--am-400)}
.tl-dot.err{background:var(--co-50);border-color:var(--co-400)}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:12px;font-weight:700;color:var(--text-h)}
.tl-meta{font-size:10px;color:var(--text-s);margin-top:2px}
.tl-value{font-family:var(--font-m);font-size:10px;color:var(--text-m);margin-top:3px;padding:4px 8px;background:var(--sur-low);border-radius:6px;display:inline-block}

/* Data rows */
.data-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--sur-low)}
.data-row:last-child{border-bottom:none}
.data-label{font-size:12px;color:var(--text-m)}
.data-value{font-size:12px;font-weight:600;color:var(--text-h)}
.data-mono{font-family:var(--font-m);font-size:11px;color:var(--text-h)}

/* SHA */
.sha-box{background:var(--sur-low);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid var(--border)}
.sha-box:hover{background:var(--sur-mid)}
.sha-text{font-family:var(--font-m);font-size:9px;color:var(--pri-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

/* Buttons */
.btn-primary{background:linear-gradient(135deg,var(--pri-800),var(--pri-600));color:#fff;border-radius:9999px;padding:8px 16px;font-size:12px;font-weight:600;box-shadow:0 4px 12px rgba(37,45,122,.25);cursor:pointer;display:inline-flex;align-items:center;gap:7px;border:none;width:100%;justify-content:center}
.btn-secondary{background:var(--sur-mid);border:1px solid var(--border);border-radius:9999px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--text-b);cursor:pointer;display:inline-flex;align-items:center;gap:7px;width:100%;justify-content:center}
.btn-secondary:hover{background:var(--sur-high)}
.btn-danger{background:var(--co-50);border:1px solid rgba(229,34,7,.2);border-radius:9999px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--co-800);cursor:pointer;display:inline-flex;align-items:center;gap:6px;width:100%;justify-content:center}

.mono-sm{font-family:var(--font-m);font-size:9px;color:var(--text-s)}
.mono{font-family:var(--font-m);font-size:11px;color:var(--text-m)}

/* Image overlay */
#imgOverlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);cursor:zoom-out}
#imgOverlay.open{display:flex}
#imgOverlay img{max-width:80vw;max-height:80vh;border-radius:12px;object-fit:contain}

/* Evidence bg colors */
.ev-placa{background:linear-gradient(135deg,#1a2260,#2a35a0)}
.ev-chassi{background:linear-gradient(135deg,#2d0a0a,#5c1010)}
.ev-vin{background:linear-gradient(135deg,#0a1a2d,#102040)}
.ev-vidro{background:linear-gradient(135deg,#0d1a10,#152218)}
</style>
</head>
<body>

<div class="page">

  <!-- Nav -->
  <div class="content-nav">
    <button class="btn-back" onclick="goTo('busca')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Voltar
    </button>
    <span class="mono-sm" style="color:var(--pri-400)" id="nav-id"></span>
    <span class="badge" id="nav-badge"></span>
    <div style="flex:1"></div>
    <button class="btn-back">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar PDF
    </button>
  </div>

  <!-- Hero -->
  <div class="hero-panel" id="hero"></div>

  <!-- Main grid -->
  <div class="detail-grid">

    <!-- Left -->
    <div>
      <div class="panel" id="panel-evidencias"></div>
      <div class="panel" id="panel-analise"></div>
      <div class="panel" id="panel-renavam"></div>
    </div>

    <!-- Right -->
    <div>
      <div class="panel" id="panel-meta"></div>
      <div class="panel" id="panel-progresso"></div>
      <div class="panel" id="panel-integridade"></div>
      <div class="panel" id="panel-acoes"></div>
    </div>

  </div>

  <!-- Footer -->
  <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--sur-high);margin-top:4px">
    <span class="mono-sm" id="footer-id"></span>
    <span class="mono-sm" id="footer-status"></span>
  </div>

</div>

<!-- Image overlay -->
<div id="imgOverlay" onclick="closeImg()">
  <img id="overlayImg" src="" alt="">
</div>

<script src="data.js"></script>
<script>
function goTo(r) {
  try {
    if (window.parent && window.parent.goTo) window.parent.goTo(r);
    else window.postMessage({ goTo: r }, '*');
  } catch(e) { window.postMessage({ goTo: r }, '*'); }
}

// ── Carrega a verificação a mostrar ─────────────────────
// Prioridade: querystring ?id=VERI-XXXX, senão a 1ª divergente
function getVerifId() {
  const qs = new URLSearchParams(window.location.search).get('id');
  if (qs && DB.verificacao(qs)) return qs;
  const diverg = DB.verificacoes.find(v => v.status === 'err');
  return diverg ? diverg.id : DB.verificacoes[0].id;
}

// ── Helpers ──────────────────────────────────────────────
function fmtData(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' · ' + d.toTimeString().slice(0,5);
}

function svgCheck(color='var(--em)') {
  return `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
}
function svgX(color='var(--co-400)') {
  return `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
}
function svgWarn(color='var(--am-400)') {
  return `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>`;
}

// ── Score ring SVG ────────────────────────────────────────
function scoreRing(score, status) {
  const col = status==='err'?'var(--co-400)':status==='warn'?'var(--am-400)':'var(--em-400)';
  const pct = score / 100;
  const circ = 2 * Math.PI * 23;
  const dash = circ * pct;
  return `
    <svg width="80" height="80" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="23" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="5"/>
      <circle cx="28" cy="28" r="23" fill="none" stroke="${col}" stroke-width="5"
        stroke-dasharray="${dash.toFixed(1)} ${(circ-dash).toFixed(1)}"
        stroke-dashoffset="${(circ*0.25).toFixed(1)}" stroke-linecap="round"
        transform="rotate(-90 28 28)"/>
      <text x="28" y="33" text-anchor="middle" font-family="Plus Jakarta Sans" font-size="16" font-weight="800" fill="white">${score}</text>
    </svg>`;
}

// ── Render ────────────────────────────────────────────────
function render() {
  const verif = DB.ficha(getVerifId());
  if (!verif) return;

  const vei  = verif.veiculo;
  const agt  = verif.agente;
  const und  = verif.unidade;
  const isErr  = verif.status === 'err';
  const isWarn = verif.status === 'warn';
  const badgeClass = DB.badge_class(verif.status);
  const badgeLabel = DB.badge_label(verif.status);
  const label = vei ? `${vei.marca} ${vei.modelo} ${vei.ano}` : '—';

  // ── Nav ──
  document.getElementById('nav-id').textContent = verif.id;
  const nb = document.getElementById('nav-badge');
  nb.textContent = badgeLabel; nb.className = `badge ${badgeClass}`;

  // ── Hero ──
  const heroColor = isErr ? 'rgba(229,34,7,.18)' : isWarn ? 'rgba(196,140,20,.15)' : 'rgba(26,158,39,.1)';
  document.getElementById('hero').innerHTML = `
    <div style="position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:20px">
      <div style="flex:1">
        <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">
          Veículo · ${verif.id}
        </div>
        <div style="font-family:var(--font-d);font-size:24px;font-weight:800;color:#fff;letter-spacing:-.3px;margin-bottom:8px">${label}</div>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:11px;color:rgba(255,255,255,.6)">Placa</span>
            <span style="font-family:var(--font-m);font-size:14px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);padding:2px 10px;border-radius:6px">${vei?.placa||'—'}</span>
          </div>
          <div style="width:1px;height:16px;background:rgba(255,255,255,.2)"></div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:11px;color:rgba(255,255,255,.6)">Cor</span>
            <span style="font-size:12px;font-weight:600;color:#fff">${vei?.cor||'—'}</span>
          </div>
          <div style="width:1px;height:16px;background:rgba(255,255,255,.2)"></div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:11px;color:rgba(255,255,255,.6)">Combustível</span>
            <span style="font-size:12px;font-weight:600;color:#fff">${vei?.combustivel||'—'}</span>
          </div>
        </div>
        ${isErr ? `
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <span style="display:inline-flex;align-items:center;gap:5px;background:rgba(229,34,7,.2);border:1px solid rgba(229,34,7,.4);border-radius:9999px;padding:3px 10px;font-size:10px;font-weight:700;color:#ffb3aa">
            ${svgX('#ffb3aa')} Divergência detectada
          </span>
        </div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        ${scoreRing(verif.score, verif.status)}
        <span style="font-family:var(--font-m);font-size:9px;color:rgba(255,255,255,.5)">SCORE RISCO</span>
        <span class="badge ${badgeClass}" style="font-size:10px;margin-top:2px">${badgeLabel}</span>
      </div>
    </div>`;

  // ── Evidências ──
  const evidencias = [
    { label:'PLACA TRASEIRA', cls:'ev-placa',  status:'ok',   score:'99.9%', icon:'camera'   },
    { label:'CHASSI',         cls:'ev-chassi', status: verif.status, score: isErr ? 'Divergente' : '96%', icon:'chassis', border: isErr },
    { label:'ETIQUETA VIN',   cls:'ev-vin',    status:'ok',   score:'96.1%', icon:'vin'      },
    { label:'VIDRO LATERAL',  cls:'ev-vidro',  status:'ok',   score:'91.8%', icon:'glass'    },
  ];
  const evIcons = {
    camera:  `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
    chassis: `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${isErr?'rgba(229,34,7,.6)':'rgba(255,255,255,.4)'}" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`,
    vin:     `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M7 8h4M7 12h6"/></svg>`,
    glass:   `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(26,158,39,.4)" stroke-width="1.5"><rect x="2" y="3" width="20" height="16" rx="2"/><path d="M2 7h20M2 12h20"/></svg>`,
  };
  const evScoreCls = s => s==='ok'?'background:var(--em-50);color:var(--em)':s==='err'?'background:var(--co-50);color:var(--co-800)':'background:var(--am-50);color:var(--am-800)';

  document.getElementById('panel-evidencias').innerHTML = `
    <div class="panel-header">
      <div><div class="panel-title">Evidências fotográficas</div><div class="panel-subtitle">4 capturas · ${fmtData(verif.data)}</div></div>
      ${isErr ? '<span class="badge badge-err">1 anomalia</span>' : '<span class="badge badge-ok">Sem anomalias</span>'}
    </div>
    <div class="panel-body">
      <div class="evidence-grid">
        ${evidencias.map((ev,i) => `
          <div class="evidence-thumb ${ev.cls}" style="${ev.border?'border:2px solid var(--co-400)':''}" onclick="openImg('')">
            ${evIcons[ev.icon]}
            <div class="ev-label">${ev.label}</div>
            <div class="ev-score" style="${evScoreCls(ev.status)}">${ev.score}</div>
          </div>`).join('')}
      </div>
      ${isErr ? `
      <div style="background:var(--co-50);border:1px solid rgba(229,34,7,.2);border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start">
        ${svgWarn('var(--co-400)')}
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--co-800);margin-bottom:3px">Adulteração de chassi detectada</div>
          <div style="font-size:11px;color:var(--text-b);line-height:1.5">
            Raspagem detectada na gravação original. Espaçamento irregular entre caracteres e profundidade inconsistente.
          </div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <span class="badge badge-err" style="font-size:9px">Adulteração</span>
            <span class="badge badge-err" style="font-size:9px">Score IA: ${verif.score}</span>
            <span class="badge badge-err" style="font-size:9px">Conf.: ${verif.qualidade_img}%</span>
          </div>
        </div>
      </div>` : ''}
    </div>`;

  // ── Análise por componente ──
  const componentes = [
    { nome:'Chassi',          status: verif.status, score: verif.score,
      conf: verif.qualidade_img,
      val:  isErr ? `${vei?.vin||'—'} ≠ esperado (divergente)` : `${vei?.vin||'—'} ✓ Confere` },
    { nome:'Etiqueta VIN',    status:'ok',  score:13,  conf:96.1, val:`${vei?.vin||'—'} ✓ Confere`          },
    { nome:'Vidros',          status:'ok',  score:8,   conf:91.8, val:'DOT 451 AS1 · 6/6 verificados'        },
    { nome:'Placa (OCR)',     status:'ok',  score:2,   conf:99.9, val:`${vei?.placa||'—'} ✓ Confere RENAVAM` },
  ];

  const dotSvg = s => s==='err'
    ? `<div class="tl-dot err">${svgX('var(--co-400)')}</div>`
    : s==='warn'
    ? `<div class="tl-dot warn">${svgWarn()}</div>`
    : `<div class="tl-dot ok">${svgCheck()}</div>`;

  document.getElementById('panel-analise').innerHTML = `
    <div class="panel-header"><div class="panel-title">Análise por componente</div></div>
    <div class="panel-body" style="padding:0">
      ${componentes.map(c => `
        <div class="timeline-item" style="padding:12px 18px 14px">
          ${dotSvg(c.status)}
          <div class="tl-body">
            <div class="tl-title">${c.nome}</div>
            <div class="tl-meta">Score ${c.score} · Confiança ${c.conf}%</div>
            <div class="tl-value" style="${c.status==='err'?'color:var(--co-800)':''}">${c.val}</div>
          </div>
          <span class="badge ${DB.badge_class(c.status)}" style="font-size:9px">${DB.badge_label(c.status)}</span>
        </div>`).join('')}
    </div>`;

  // ── Dados RENAVAM ──
  const renawamRows = [
    ['Marca / Modelo', `${vei?.marca||'—'} ${vei?.modelo||''}`],
    ['Ano/Modelo',     `${vei?.ano||'—'}/${vei?.ano||'—'}`],
    ['RENAVAM',        vei?.renavam||'—'],
    ['Combustível',    vei?.combustivel||'—'],
    ['Cor',            vei?.cor||'—'],
    ['Chassi (RENAVAM)', vei?.vin||'—'],
    ['Proprietário',   vei?.proprietario||'—'],
    ['UF',             und?.uf||'—'],
    ['CRLV',           '<span style="color:var(--em)">Válido · 2026</span>'],
    ['Seguro obrig.',  '<span style="color:var(--em)">Ativo</span>'],
  ];

  document.getElementById('panel-renavam').innerHTML = `
    <div class="panel-header">
      <div><div class="panel-title">Dados do veículo · RENAVAM</div><div class="panel-subtitle">Consultado em ${fmtData(verif.data)}</div></div>
      <span class="badge badge-ok">Sem restrições</span>
    </div>
    <div class="panel-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 24px">
        ${renawamRows.map(([l,v]) => `
          <div class="data-row">
            <span class="data-label">${l}</span>
            <span class="data-value">${v}</span>
          </div>`).join('')}
      </div>
    </div>`;

  // ── Metadados ──
  document.getElementById('panel-meta').innerHTML = `
    <div class="panel-header"><div class="panel-title">Metadados</div></div>
    <div class="panel-body">
      <div class="data-row"><span class="data-label">ID</span><span class="data-mono" style="color:var(--pri-600)">${verif.id}</span></div>
      <div class="data-row"><span class="data-label">Data / Hora</span><span class="data-value">${fmtData(verif.data)}</span></div>
      <div class="data-row"><span class="data-label">Agente</span><span class="data-value">${agt?.nome||'—'} · ${agt?.matricula||'—'}</span></div>
      <div class="data-row"><span class="data-label">Unidade</span><span class="data-value">${und?.nome||'—'} · ${und?.uf||'—'}</span></div>
      <div class="data-row"><span class="data-label">Duração</span><span class="data-mono">${verif.duracao}</span></div>
      <div class="data-row"><span class="data-label">Qualidade imagens</span><span class="data-value" style="color:var(--em)">${verif.qualidade_img}%</span></div>
      <div class="data-row"><span class="data-label">Assinatura</span><span class="badge ${verif.assinado?'badge-ok':'badge-err'}" style="font-size:9px">${verif.assinado?'ICP-Brasil':'Pendente'}</span></div>
      <div class="data-row"><span class="data-label">Status</span><span class="badge ${badgeClass}" style="font-size:9px">${badgeLabel}</span></div>
    </div>`;

  // ── Progresso ──
  const steps = [
    {label:'Início',      done:true,  alert:false},
    {label:'Marcações',   done:true,  alert:false},
    {label:'Resultado',   done:true,  alert:isErr},
    {label:'Assinatura',  done:verif.assinado, alert:false},
  ];
  document.getElementById('panel-progresso').innerHTML = `
    <div class="panel-header"><div class="panel-title">Progresso do processo</div></div>
    <div class="panel-body">
      <div style="display:flex;justify-content:space-between;position:relative;margin-bottom:4px">
        <div style="position:absolute;top:9px;left:9px;right:9px;height:2px;background:var(--sur-high)"></div>
        <div style="position:absolute;top:9px;left:9px;width:${steps.filter(s=>s.done).length/steps.length*100}%;height:2px;background:var(--pri-400)"></div>
        ${steps.map((s,i) => {
          const t = new Date(verif.data);
          t.setMinutes(t.getMinutes() + i*4);
          const timeStr = s.done ? t.toTimeString().slice(0,5) : '–';
          const bg = s.alert ? 'background:var(--co-50);border:2px solid var(--co-400)' : s.done ? 'background:var(--em-400)' : 'background:var(--sur-high);border:2px solid var(--border)';
          return `
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:1">
              <div style="width:20px;height:20px;border-radius:50%;${bg};display:flex;align-items:center;justify-content:center">
                ${s.done && !s.alert ? svgCheck('#fff') : s.alert ? svgX('var(--co-400)') : ''}
              </div>
              <span class="mono-sm" style="${s.alert?'color:var(--co-400)':''}">${timeStr}<br>${s.label}</span>
            </div>`;
        }).join('')}
      </div>
    </div>`;

  // ── Integridade ──
  document.getElementById('panel-integridade').innerHTML = `
    <div class="panel-header"><div class="panel-title">Integridade do dossiê</div></div>
    <div class="panel-body">
      <div class="sha-box" onclick="copySHA('${verif.sha256}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-s)" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <div style="flex:1;min-width:0">
          <div style="font-size:9px;font-weight:700;color:var(--text-s);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">SHA-256</div>
          <div class="sha-text">${verif.sha256.slice(0,34)}…</div>
        </div>
        <svg id="sha-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-s)" stroke-width="1.8"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </div>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:0">
        <div class="data-row"><span class="data-label">Assinatura digital</span><span class="badge ${verif.assinado?'badge-ok':'badge-err'}" style="font-size:9px">${verif.assinado?'ICP-Brasil':'Pendente'}</span></div>
        <div class="data-row"><span class="data-label">Registro blockchain</span><span class="badge ${verif.assinado?'badge-ok':'badge-err'}" style="font-size:9px">${verif.assinado?'Registrado':'Pendente'}</span></div>
        <div class="data-row"><span class="data-label">Notificação DENATRAN</span><span class="badge badge-ok" style="font-size:9px">Enviada</span></div>
      </div>
    </div>`;

  // ── Ações ──
  document.getElementById('panel-acoes').innerHTML = `
    <div class="panel-header"><div class="panel-title">Ações</div></div>
    <div class="panel-body" style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-primary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Assinar relatório
      </button>
      <button class="btn-secondary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar PDF completo
      </button>
      <button class="btn-secondary" onclick="goTo('inteligencia')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Ver conexões no grafo
      </button>
      <button class="btn-danger">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>
        Escalar para investigação
      </button>
    </div>`;

  // ── Footer ──
  document.getElementById('footer-id').textContent = `V3R1 DETALHE · ${verif.id}`;
  document.getElementById('footer-status').innerHTML =
    `${agt?.nome||'—'} · <span style="color:${isErr?'var(--co-400)':isWarn?'var(--am-400)':'var(--em-400)'}">${badgeLabel.toUpperCase()}</span>`;
}

// ── Imagem overlay ────────────────────────────────────────
function openImg(src) {
  document.getElementById('overlayImg').src = src;
  document.getElementById('imgOverlay').classList.add('open');
}
function closeImg() { document.getElementById('imgOverlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeImg(); });

// ── Copiar SHA ────────────────────────────────────────────
function copySHA(sha) {
  navigator.clipboard?.writeText(sha);
  const box  = document.querySelector('.sha-box');
  const icon = document.getElementById('sha-icon');
  if (!box||!icon) return;
  box.style.background = 'var(--em-50)';
  icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
  icon.style.stroke = 'var(--em)';
  setTimeout(() => {
    box.style.background = '';
    icon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>';
    icon.style.stroke = '';
  }, 2000);
}

render();
</script>
</body>
</html>
