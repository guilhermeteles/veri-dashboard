<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V3R1 · Busca Avançada</title>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --pri:#252d7a;--pri-50:#eceeff;--pri-100:#d8daff;--pri-400:#5c66d4;--pri-600:#3d4592;--pri-800:#252d7a;
  --em:#168821;--em-50:#e6f4e8;--em-400:#1a9e27;
  --am:#C48C14;--am-50:#fdf3dc;--am-400:#C48C14;--am-800:#7a5600;
  --co:#E52207;--co-50:#fdecea;--co-400:#E52207;--co-800:#8c1200;
  --bg:#f8f9ff;--surface:#ffffff;--sur-low:#f1f3fb;--sur-mid:#eceef6;--sur-high:#e6e8f0;
  --text-h:#181c21;--text-b:#464651;--text-m:#595c7c;--text-s:#767682;--border:#d8dae8;
  --font-d:'Plus Jakarta Sans',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'JetBrains Mono',monospace;
  --sh-card:0 1px 3px rgba(37,45,122,.08),0 4px 16px rgba(37,45,122,.04);
}
html,body{height:100%;overflow-y:auto;font-family:var(--font-b);background:var(--bg);color:var(--text-h)}
body::-webkit-scrollbar{width:6px}
body::-webkit-scrollbar-track{background:transparent}
body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.page{padding:20px 24px;display:flex;flex-direction:column;gap:14px}

/* Search bar */
.search-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px 18px;box-shadow:var(--sh-card)}
.search-input-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.search-input{flex:1;border:none;outline:none;font-family:var(--font-b);font-size:14px;color:var(--text-h);background:transparent}
.search-input::placeholder{color:var(--text-s)}
.search-kbd{font-family:var(--font-m);font-size:10px;color:var(--text-s);background:var(--sur-mid);border:1px solid var(--border);border-radius:5px;padding:2px 7px;flex-shrink:0}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:11px;font-weight:700;color:var(--text-s)}
.filter-pill{font-family:var(--font-b);font-size:11px;font-weight:600;padding:4px 12px;border-radius:9999px;border:1px solid var(--border);color:var(--text-m);cursor:pointer;background:var(--surface);transition:all .15s}
.filter-pill:hover{background:var(--sur-low);color:var(--text-h)}
.filter-pill.active{background:var(--pri-800);color:#fff;border-color:var(--pri-800)}
.filter-pill.ok{background:var(--em-50);color:var(--em);border-color:rgba(22,136,33,.2)}
.filter-pill.warn{background:var(--am-50);color:var(--am-800);border-color:rgba(196,140,20,.2)}
.filter-pill.err{background:var(--co-50);color:var(--co-800);border-color:rgba(229,34,7,.15)}
.filter-sep{width:1px;height:16px;background:var(--border)}

/* Panel */
.panel{background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:var(--sh-card);overflow:hidden}
.panel-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sur-low)}
.panel-title{font-family:var(--font-d);font-size:13px;font-weight:800;color:var(--text-h)}
.panel-subtitle{font-size:10px;color:var(--text-s);margin-top:1px}

/* Table */
.data-table{width:100%;border-collapse:collapse}
.data-table thead th{font-size:10px;font-weight:700;color:var(--text-s);text-align:left;text-transform:uppercase;letter-spacing:.7px;padding:10px 14px;background:var(--sur-low);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
.data-table thead th:hover{background:var(--sur-mid)}
.data-table thead th.sorted{color:var(--pri-600)}
.data-table tbody td{font-size:12px;color:var(--text-b);padding:11px 14px;border-bottom:1px solid var(--sur-low);transition:background .1s}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--sur-low);cursor:pointer}
.data-table tbody tr.highlight td{background:rgba(229,34,7,.03)}

/* Badge + score */
.badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-b);font-size:10px;font-weight:700;padding:2px 8px;border-radius:9999px}
.badge-ok{background:var(--em-50);color:var(--em);border:1px solid rgba(22,136,33,.15)}
.badge-warn{background:var(--am-50);color:var(--am-800);border:1px solid rgba(196,140,20,.2)}
.badge-err{background:var(--co-50);color:var(--co-800);border:1px solid rgba(229,34,7,.15)}
.score-pill{font-family:var(--font-m);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.score-ok{background:var(--em-50);color:var(--em)}
.score-warn{background:var(--am-50);color:var(--am-800)}
.score-err{background:var(--co-50);color:var(--co-800)}

.mono{font-family:var(--font-m);font-size:11px;color:var(--text-m)}
.mono-sm{font-family:var(--font-m);font-size:9px;color:var(--text-s)}

/* Buttons */
.btn-primary{background:linear-gradient(135deg,var(--pri-800),var(--pri-600));color:#fff;border-radius:9999px;padding:7px 16px;font-family:var(--font-b);font-size:12px;font-weight:600;box-shadow:0 4px 12px rgba(37,45,122,.25);cursor:pointer;display:inline-flex;align-items:center;gap:7px;border:none}
.btn-secondary{background:var(--sur-mid);border:1px solid var(--border);border-radius:9999px;padding:6px 14px;font-size:11px;font-weight:600;color:var(--text-b);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-secondary:hover{background:var(--sur-high)}

/* Stats strip */
.stats-strip{display:flex;gap:20px;align-items:center}
.stat-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-m)}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Pagination */
.pagination{display:flex;align-items:center;gap:4px;justify-content:center;padding:12px 0}
.page-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-m);transition:all .15s}
.page-btn:hover{background:var(--sur-low)}
.page-btn.active{background:var(--pri-800);color:#fff;border-color:var(--pri-800)}
.page-btn.dots{border-color:transparent;background:none;cursor:default;color:var(--text-s)}

/* Footer */
.footer{display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid var(--sur-high)}
</style>
</head>
<body>
<div class="page">

  <!-- Search bar -->
  <div class="search-wrap">
    <div class="search-input-row">
      <svg style="color:var(--text-s);flex-shrink:0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar por VIN, placa, modelo, agente, unidade..." oninput="doSearch(this.value)">
      <span class="search-kbd">⌘K</span>
      <button class="btn-primary" onclick="doSearch(document.getElementById('searchInput').value)">Buscar</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Resultado:</span>
      <button class="filter-pill active" id="fp-todos" onclick="setFilter('todos',this)">Todos</button>
      <button class="filter-pill ok"   onclick="setFilter('ok',this)">✓ Compatível</button>
      <button class="filter-pill warn" onclick="setFilter('warn',this)">⚠ Atenção</button>
      <button class="filter-pill err"  onclick="setFilter('err',this)">✕ Divergente</button>
      <div class="filter-sep"></div>
      <span class="filter-label">Unidade:</span>
      <select id="filter-unidade" style="font-size:11px;font-weight:600;color:var(--text-b);background:var(--sur-low);border:1px solid var(--border);border-radius:9999px;padding:4px 12px;cursor:pointer" onchange="doSearch(document.getElementById('searchInput').value)">
        <option value="">Todas</option>
      </select>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-strip" id="stats-strip"></div>

  <!-- Results -->
  <div class="panel">
    <div class="panel-header">
      <div>
        <div class="panel-title">Resultados · <span id="results-count">0</span> verificações</div>
        <div class="panel-subtitle" id="results-sub"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="mono-sm" id="query-display"></span>
        <button class="btn-secondary" onclick="clearSearch()">Limpar filtros</button>
        <button class="btn-secondary" onclick="exportCSV()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar CSV
        </button>
      </div>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th onclick="sortBy('vin')">VIN <span style="opacity:.4">↕</span></th>
          <th onclick="sortBy('veiculo')">Veículo <span style="opacity:.4">↕</span></th>
          <th onclick="sortBy('data')" class="sorted" id="th-data">Data/Hora <span style="opacity:1">↓</span></th>
          <th onclick="sortBy('agente')">Agente <span style="opacity:.4">↕</span></th>
          <th onclick="sortBy('unidade')">Unidade <span style="opacity:.4">↕</span></th>
          <th onclick="sortBy('score')">Score <span style="opacity:.4">↕</span></th>
          <th>Resultado</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="footer">
    <span class="mono-sm">V3R1 BUSCA · <span id="footer-versao"></span></span>
    <span class="mono-sm" id="fbar"></span>
  </div>

</div>

<script src="data.js"></script>
<script>
function goTo(r) {
  try {
    if (window.parent && window.parent.goTo) window.parent.goTo(r);
    else window.postMessage({ goTo: r }, '*');
  } catch(e) { window.postMessage({ goTo: r }, '*'); }
}

// ── Tabela flat derivada do DB ───────────────────────────
const TODOS = DB.verificacoes.map(v => {
  const vei = DB.veiculo(v.veiculo_id);
  const agt = DB.agente(v.agente_id);
  const und = DB.unidade(v.unidade_id);
  const d   = new Date(v.data);
  return {
    id:      v.id,
    vin:     vei?.vin || '—',
    veiculo: vei ? `${vei.marca} ${vei.modelo} ${vei.ano}` : '—',
    data:    d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toTimeString().slice(0,5),
    ts:      d,
    agente:  agt?.nome || '—',
    unidade: und?.nome || '—',
    score:   v.score,
    status:  v.status,
  };
});

// Popula select de unidades a partir do DB
(function() {
  const sel = document.getElementById('filter-unidade');
  DB.unidades.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.nome; opt.textContent = u.nome;
    sel.appendChild(opt);
  });
})();

// Stats strip
(function() {
  const tots = DB.totais();
  document.getElementById('stats-strip').innerHTML = `
    <div class="stat-item"><div class="stat-dot" style="background:var(--pri-400)"></div>${tots.verificacoes} verificações</div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--co-400)"></div>${tots.err} divergentes</div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--am-400)"></div>${tots.warn} atenção</div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--em-400)"></div>${tots.ok} compatíveis</div>
  `;
})();

// ── State ────────────────────────────────────────────────
let currentFilter = 'todos';
let currentSort   = { col:'data', dir:-1 };
let currentPage   = 1;
const PER_PAGE    = 8;

function scorePillClass(s) { return s>=75?'score-err':s>=50?'score-warn':'score-ok'; }

function getFiltered(query) {
  const q = (query||'').toLowerCase().trim();
  const unidade = document.getElementById('filter-unidade').value;
  return TODOS.filter(r => {
    if (currentFilter !== 'todos' && r.status !== currentFilter) return false;
    if (unidade && r.unidade !== unidade) return false;
    if (!q) return true;
    return r.vin.toLowerCase().includes(q)
        || r.veiculo.toLowerCase().includes(q)
        || r.agente.toLowerCase().includes(q)
        || r.unidade.toLowerCase().includes(q)
        || r.id.toLowerCase().includes(q);
  });
}

function doSearch(q) { currentPage=1; renderTable(q); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  renderTable(document.getElementById('searchInput').value);
}

const SORT_IDX = {vin:0,veiculo:1,data:2,agente:3,unidade:4,score:5};
function sortBy(col) {
  if (currentSort.col===col) currentSort.dir*=-1;
  else { currentSort.col=col; currentSort.dir=-1; }
  document.querySelectorAll('.data-table thead th').forEach(th => th.classList.remove('sorted'));
  const ths = document.querySelectorAll('.data-table thead th');
  if (ths[SORT_IDX[col]]) ths[SORT_IDX[col]].classList.add('sorted');
  renderTable(document.getElementById('searchInput').value);
}

function renderTable(query) {
  query = query ?? document.getElementById('searchInput').value ?? '';
  let data = getFiltered(query);
  data.sort((a,b) => {
    let va = a[currentSort.col], vb = b[currentSort.col];
    if (currentSort.col==='score') { va=+va; vb=+vb; }
    if (currentSort.col==='data')  { va=a.ts; vb=b.ts; }
    if (va<vb) return currentSort.dir;
    if (va>vb) return -currentSort.dir;
    return 0;
  });

  const total = data.length;
  const pages = Math.max(1, Math.ceil(total/PER_PAGE));
  if (currentPage>pages) currentPage=1;
  const slice = data.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  document.getElementById('results-count').textContent = total;
  document.getElementById('results-sub').textContent   = `Página ${currentPage} de ${pages}`;
  document.getElementById('query-display').textContent = query ? `"${query}"` : '';

  document.getElementById('results-body').innerHTML = slice.map(r => `
    <tr class="${r.status==='err'?'highlight':''}" onclick="goTo('detalhe')" style="cursor:pointer">
      <td><span class="mono">${r.vin.slice(0,10)}…</span></td>
      <td style="font-weight:600;color:var(--text-h)">${r.veiculo}</td>
      <td><span class="mono-sm">${r.data}</span></td>
      <td>${r.agente}</td>
      <td>${r.unidade}</td>
      <td><span class="score-pill ${scorePillClass(r.score)}">${r.score}</span></td>
      <td><span class="badge ${DB.badge_class(r.status)}">${DB.badge_label(r.status)}</span></td>
      <td><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-s)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></td>
    </tr>`).join('');

  // Paginação
  const pg = document.getElementById('pagination');
  if (pages<=1) { pg.innerHTML=''; return; }
  let html = '';
  if (currentPage>1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i=1; i<=pages; i++) {
    if (i===1||i===pages||Math.abs(i-currentPage)<=1)
      html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i-currentPage)===2)
      html += `<span class="page-btn dots">…</span>`;
  }
  if (currentPage<pages) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
  pg.innerHTML = html;
}

function goPage(p) { currentPage=p; renderTable(); }

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filter-unidade').value = '';
  currentFilter = 'todos';
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  document.getElementById('fp-todos').classList.add('active');
  currentPage = 1;
  renderTable('');
}

function exportCSV() {
  const data = getFiltered(document.getElementById('searchInput').value);
  const rows = [['ID','VIN','Veículo','Data','Agente','Unidade','Score','Status']];
  data.forEach(r => rows.push([r.id, r.vin, r.veiculo, r.data, r.agente, r.unidade, r.score, DB.badge_label(r.status)]));
  const csv = rows.map(r => r.join(';')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'v3r1-busca.csv';
  a.click();
}

function tick() {
  const t = new Date().toTimeString().slice(0,8);
  const f = document.getElementById('fbar');
  if (f) f.innerHTML = `SYNC: ${t} · <span style="color:var(--em-400)">ONLINE</span>`;
}

document.getElementById('footer-versao').textContent = DB.sistema.versao;
renderTable('');
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
