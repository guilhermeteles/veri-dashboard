<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V3R1 · Dashboard Web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0c1a}
#dash-frame{width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>
<iframe id="dash-frame" src="dash-01-visao-geral.html" allowfullscreen></iframe>
<script>
const ROUTES = {
  'visao-geral':   'dash-01-visao-geral.html',
  'monitoramento': 'dash-02-monitoramento.html',
  'tatica':        'dash-03-tatica.html',
  'inteligencia':  'dash-04-inteligencia.html',
  'detalhe':       'dash-05-detalhe.html',
  'performance':   'dash-06-performance.html',
  'busca':         'dash-07-busca.html',
  'configuracoes': 'dash-08-configuracoes.html',
};
window.goTo = function(rota) {
  const src = ROUTES[rota];
  if (src) document.getElementById('dash-frame').src = src;
  else console.warn('V3R1 dash: rota desconhecida →', rota);
};
window.addEventListener('message', function(e) {
  if (e.data && e.data.goTo) window.goTo(e.data.goTo);
});
</script>
</body>
</html>
